server:
  host: "0.0.0.0"
  port: 8080

log:
  directives:
    - "warn"
    - "api=debug"
    - "infra=debug"
    - "domain=debug"
    - "usecase=debug"

moralis:
  base_url: "https://deep-index.moralis.io/api/v2.2"
  api_key: ~
  cache:
    page_ttl_secs: 86400
    page_max_capacity: 10000
    latest_block_ttl_secs: 15
    block_cache_max_capacity: 5000
    block_cache_ttl_secs: 604800
    file_cache:
      enabled: true
      dir: "./moralis_cache"

trongrid:
  enabled: true
  base_url: "https://api.trongrid.io"
  api_key: ~
  page_ttl_secs: 3600
  page_max_capacity: 10000
  max_pages_per_endpoint: 50
  file_cache:
    enabled: true
    dir: "./trongrid_cache"

proxy:
  socks_url: "socks5h://127.0.0.1:2080"

database:
  url: "postgres://wallet:wallet@127.0.0.1:5432/wallet_db"

telemetry:
  enabled: true
  otlp_endpoint: "http://127.0.0.1:4317"
  service_name: "paytraces-api"
